regular5=af8787
regular6=87afaf
regular7=dfdfaf
bright0=626262
bright1=af5f5f
bright2=87875f
bright3=af875f
bright4=878787
bright5=af8787
bright6=87afaf
bright7=dfdfaf
alpha=1

